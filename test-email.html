<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📧 EmailJS Test — CampusLink</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --primary: #22C55E; --bg: #F9FAFB; --card: #FFFFFF; --text: #1F2937; --border: #E5E7EB; }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--bg); color: var(--text); padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1.5px solid var(--border); }
        h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; color: var(--primary); margin-bottom: 5px; }
        p.subtitle { color: #6B7280; font-size: 0.9rem; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 700; font-size: 0.85rem; margin-bottom: 5px; color: #4B5563; }
        input, textarea { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.95rem; box-sizing: border-box; }
        input:focus { border-color: var(--primary); outline: none; }
        .btn { background: var(--primary); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 10px; transition: transform 0.2s; }
        .btn:active { transform: scale(0.98); }
        .status { margin-top: 20px; padding: 15px; border-radius: 10px; font-size: 0.9rem; display: none; }
        .status.success { background: #DCFCE7; color: #166534; border: 1px solid #BBF7D0; display: block; }
        .status.error { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; display: block; }
        .config-box { background: #f3f4f6; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 0.8rem; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h1>📧 EmailJS Lab</h1>
    <p class="subtitle">Use this to test your keys and template tags manually.</p>

    <div class="config-box">
        <b>ID Check:</b><br>
        Service: service_7n0uxto<br>
        Template: template_uaqr74q<br>
        Key: Wg09n64IvKke8j7RN
    </div>

    <div class="form-group">
        <label>BCC Emails (Comma separated)</label>
        <input type="text" id="bcc_list" placeholder="test1@gmail.com, test2@gmail.com" value="businessdevelopment734@gmail.com">
    </div>

    <div class="form-group">
        <label>Event Name ({{event_name}})</label>
        <input type="text" id="event_name" placeholder="Test Event Title" value="🚀 Manual Test Event">
    </div>

    <div class="form-group">
        <label>College Name ({{event_college}})</label>
        <input type="text" id="event_college" placeholder="College Name" value="Sona College of Technology">
    </div>

    <div class="form-group">
        <label>Event Date ({{event_date}})</label>
        <input type="text" id="event_date" value="March 30, 2024 at 10:00 AM">
    </div>

    <div class="form-group">
        <label>Description ({{event_description}})</label>
        <textarea id="event_description" rows="4">This is a test notification from the CampusLink EmailJS Lab. If you see this, your EmailJS system is working perfectly!</textarea>
    </div>

    <button class="btn" onclick="sendTest()">🚀 Send Test Broadcast</button>

    <div id="statusBox" class="status"></div>
</div>

<script>
    // Initialize with your Public Key
    emailjs.init("Wg09n64IvKke8j7RN");

    async function sendTest() {
        const btn = document.querySelector('.btn');
        const statusBox = document.getElementById('statusBox');
        
        btn.innerText = "⏳ Sending...";
        btn.disabled = true;
        statusBox.className = "status";
        statusBox.innerText = "";

        const params = {
            bcc_list: document.getElementById('bcc_list').value,
            event_name: document.getElementById('event_name').value,
            event_college: document.getElementById('event_college').value,
            event_date: document.getElementById('event_date').value,
            event_description: document.getElementById('event_description').value,
            to_name: "Admin Tester",
            subject: "📩 Quick Test from Lab",
            to_email: "businessdevelopment734@gmail.com"
        };

        try {
            const res = await emailjs.send("service_7n0uxto", "template_uaqr74q", params);
            console.log("SUCCESS!", res);
            statusBox.className = "status success";
            statusBox.innerText = "✅ SUCCESS! Email sent to EmailJS server. Check your dashboard/inbox.";
        } catch (err) {
            console.error("FAILED...", err);
            statusBox.className = "status error";
            statusBox.innerText = "❌ FAILED: " + JSON.stringify(err);
        } finally {
            btn.innerText = "🚀 Send Test Broadcast";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
