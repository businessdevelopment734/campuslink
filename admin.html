<!DOCTYPE html>
<html lang="en" data-theme="emerald">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Admin Panel — CampusLink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    :root {
      --admin-bg: var(--bg);
      --admin-card: var(--card);
    }

    .admin-body {
      display: flex;
      min-height: 100vh;
      background: var(--admin-bg);
    }

    .admin-sidebar {
      width: 260px;
      background: var(--admin-card);
      border-right: 1.5px solid var(--border);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .admin-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      color: var(--primary);
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .logo-img {
      height: 32px;
      width: auto;
      object-fit: contain;
    }

    .admin-nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
      cursor: pointer;
    }

    .admin-nav-item:hover {
      background: var(--bg2);
      color: var(--text);
    }

    .admin-nav-item.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 12px var(--glow);
    }

    .admin-main {
      flex: 1;
      padding: 32px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .admin-title h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      margin: 0;
    }

    .admin-stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--admin-card);
      padding: 24px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      transition: transform 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-4px);
    }

    .stat-card h3 {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text);
    }

    .admin-table-container {
      background: var(--admin-card);
      border-radius: 20px;
      border: 1.5px solid var(--border);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th {
      padding: 16px 24px;
      background: var(--bg2);
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
    }

    td {
      padding: 16px 24px;
      border-top: 1.5px solid var(--border);
      font-size: 0.9rem;
      vertical-align: middle;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .badge-admin {
      background: #fee2e2;
      color: #ef4444;
    }

    .badge-user {
      background: #e0f2fe;
      color: #0ea5e9;
    }

    .action-btn {
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .btn-delete {
      background: #fee2e2;
      color: #ef4444;
    }

    .btn-delete:hover {
      background: #ef4444;
      color: #fff;
    }

    @media (max-width: 768px) {
      .admin-sidebar {
        position: fixed;
        left: -260px;
        z-index: 2000;
        transition: left 0.3s ease;
        display: flex;
      }

      .admin-sidebar.open {
        left: 0;
      }

      .admin-main {
        padding: 80px 16px 20px;
      }

      .mobile-admin-header {
        display: flex;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 60px;
        background: var(--admin-card);
        border-bottom: 1.5px solid var(--border);
        padding: 0 16px;
        align-items: center;
        justify-content: space-between;
        z-index: 1000;
      }

      .menu-toggle {
        background: var(--bg2);
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 1.2rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1900;
        display: none;
      }

      .sidebar-overlay.active {
        display: block;
      }
    }

    @media (min-width: 1024px) {
      html {
        font-size: 250%;
      }

      .admin-sidebar {
        width: 4.5rem;
        padding: 0.4rem;
      }

      .admin-main {
        padding: 0.8rem;
      }

      .stat-card {
        padding: 0.5rem;
        border-radius: 0.4rem;
        margin-bottom: 0.4rem;
      }

      .admin-table-container {
        border-radius: 0.4rem;
      }

      .admin-logo {
        margin-bottom: 1rem;
        font-size: 0.6rem;
      }

      .admin-nav-item {
        padding: 0.3rem 0.4rem;
        border-radius: 0.2rem;
        gap: 0.3rem;
        font-size: 0.4rem;
        margin-bottom: 0.2rem;
      }

      .stat-card h3 {
        font-size: 0.3rem;
        margin-bottom: 0.2rem;
      }

      .stat-card .value {
        font-size: 0.7rem;
      }

      .admin-title h1 {
        font-size: 0.8rem;
      }

      th,
      td {
        padding: 0.4rem;
        font-size: 0.35rem;
      }

      .action-btn {
        padding: 0.2rem 0.3rem;
        font-size: 0.3rem;
        border-radius: 0.2rem;
      }

      .nav-avatar {
        width: 1.2rem;
        height: 1.2rem;
      }
    }

    /* Reset for very large font scaling to prevent breakage */
    .admin-view {
      width: 100%;
      overflow-x: auto;
    }
  </style>
</head>

<body class="loading">

  <div id="loadingScreen" role="status">
    <img src="logo.png" alt="Logo" class="loading-logo" onerror="this.style.display='none'">
    <div class="spinner"></div>
    <h2>CampusLink Admin</h2>
  </div>

  <div id="contentReady" class="content-ready">
    <div class="mobile-admin-header" style="display:none">
      <button class="menu-toggle" onclick="toggleAdminSidebar()">☰</button>
      <div class="admin-logo" style="margin:0; font-size: 1.1rem;" onclick="window.location.reload()">
        <img src="logo.png" alt="Logo" class="logo-img" style="height: 24px;" onerror="this.style.display='none'">
        Admin
      </div>
      <div class="nav-avatar" id="adminAvatarMobile" style="width:36px; height:36px;"></div>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleAdminSidebar()"></div>

    <div class="admin-body">
      <aside class="admin-sidebar" id="adminSidebar">
        <div class="admin-logo" onclick="window.location.reload()">
          <img src="logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
          Admin
        </div>
        <a class="admin-nav-item active" onclick="switchAdminTab('dashboard')">📊 Dashboard</a>
        <a class="admin-nav-item" onclick="switchAdminTab('users')">👥 Users</a>
        <a class="admin-nav-item" onclick="switchAdminTab('posts')">📰 Posts</a>
        <a class="admin-nav-item" onclick="switchAdminTab('reports')">🚩 Reports</a>
        <div style="margin-top: auto;">
          <a class="admin-nav-item" href="index.html">🏠 Back to Site</a>
        </div>
      </aside>

      <main class="admin-main">
        <header class="admin-header">
          <div class="admin-title">
            <h1 id="tabTitle">Dashboard</h1>
          </div>
          <div class="nav-avatar" id="adminAvatar"></div>
        </header>

        <!-- Dashboard View -->
        <section id="view-dashboard" class="admin-view">
          <div class="admin-stats-grid">
            <div class="stat-card">
              <h3>Total Users</h3>
              <div class="value" id="countUsers">0</div>
            </div>
            <div class="stat-card">
              <h3>Total Posts</h3>
              <div class="value" id="countPosts">0</div>
            </div>
            <div class="stat-card">
              <h3>Active Reports</h3>
              <div class="value" id="countReports">0</div>
            </div>
          </div>

          <div class="admin-table-container">
            <div style="padding: 24px; border-bottom: 1.5px solid var(--border);">
              <h3 style="font-family: 'Syne'; margin: 0;">Recent Activity</h3>
            </div>
            <table id="recentActivityTable">
              <thead>
                <tr>
                  <th>User</th>
                  <th>Action</th>
                  <th>Time</th>
                </tr>
              </thead>
              <tbody>
                <!-- Dynamic content -->
              </tbody>
            </table>
          </div>
        </section>

        <!-- Users View -->
        <section id="view-users" class="admin-view" style="display:none">
          <div class="admin-table-container">
            <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
              <input type="text" class="search-input" placeholder="Search users..." id="userSearch"
                style="max-width:300px">
            </div>
            <table id="usersTable">
              <thead>
                <tr>
                  <th>Avatar</th>
                  <th>Name</th>
                  <th>Role</th>
                  <th>Posts</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>

        <!-- Posts View -->
        <section id="view-posts" class="admin-view" style="display:none">
          <div class="admin-table-container">
            <table id="postsTable">
              <thead>
                <tr>
                  <th>Author</th>
                  <th>Description</th>
                  <th>Type</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>

      </main>
    </div>
  </div>

  <div id="toastEl"></div>

  <script type="module" src="admin.js"></script>
  <script>
    window.toggleAdminSidebar = function () {
      const sidebar = document.getElementById('adminSidebar');
      const overlay = document.getElementById('sidebarOverlay');
      sidebar.classList.toggle('open');
      overlay.classList.toggle('active');
    }

    // Ensure mobile header visibility matches media query
    function checkMobile() {
      const header = document.querySelector('.mobile-admin-header');
      if (window.innerWidth <= 768) {
        header.style.display = 'flex';
      } else {
        header.style.display = 'none';
      }
    }
    window.addEventListener('resize', checkMobile);
    window.addEventListener('load', checkMobile);
  </script>
</body>

</html>
