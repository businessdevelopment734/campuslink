<!DOCTYPE html>
<html lang="en" data-theme="emerald">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Messages — CampusLink</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<style>
/* ── Layout ── */
html,body{overflow-x:hidden;width:100%}
body{margin:0;overflow:hidden;padding:0}
.msg-shell{
  position:fixed;top:60px;left:0;right:0;bottom:0;
  display:grid;grid-template-columns:300px 1fr;overflow:hidden}

/* ── Sidebar ── */
.conv-panel{
  border-right:1.5px solid var(--border);background:var(--card);
  display:flex;flex-direction:column;overflow:hidden}
.conv-header{
  padding:16px;border-bottom:1.5px solid var(--border);
  font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--text);
  display:flex;align-items:center;justify-content:space-between}
.new-msg-btn{
  width:36px;height:36px;border-radius:50%;border:none;
  background:var(--grad);color:#fff;font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.new-msg-btn:hover{transform:scale(1.1);box-shadow:0 4px 12px var(--glow)}

.conv-search{padding:10px 14px;border-bottom:1px solid var(--border);position:relative}
.conv-search input{
  width:100%;padding:9px 14px 9px 36px;border-radius:30px;
  border:1.5px solid var(--border);background:var(--bg2);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;transition:all .2s}
.conv-search input:focus{border-color:var(--primary)}
.conv-search-icon{position:absolute;left:24px;top:50%;transform:translateY(-50%);font-size:.85rem;color:var(--muted)}

.conv-list{flex:1;overflow-y:auto}
.conv-list::-webkit-scrollbar{width:4px}
.conv-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.conv-item{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  cursor:pointer;border-bottom:1px solid var(--border);transition:all .18s;position:relative}
.conv-item:hover{background:var(--bg2)}
.conv-item.active{background:var(--glow);border-right:3px solid var(--primary)}
.conv-item.unread-conv{background:var(--glow)}

.conv-avi{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  background:var(--grad);display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:.9rem;font-weight:800;color:#fff;
  overflow:hidden;position:relative}
.conv-avi img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.online-dot{
  width:11px;height:11px;border-radius:50%;background:#22C55E;
  border:2px solid var(--card);position:absolute;bottom:0;right:0}

.conv-info{flex:1;min-width:0}
.conv-name{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;color:var(--text)}
.conv-preview{font-size:.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.conv-time{font-size:.68rem;color:var(--muted)}
.conv-unread-badge{
  min-width:18px;height:18px;background:var(--primary);border-radius:99px;
  display:flex;align-items:center;justify-content:center;
  font-size:.6rem;font-weight:800;color:#fff;padding:0 4px;font-family:'Syne',sans-serif}

.conv-empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:.88rem}

/* ── Chat Area ── */
.chat-area{display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.chat-header{
  padding:14px 20px;background:var(--card);border-bottom:1.5px solid var(--border);
  display:flex;align-items:center;gap:14px}
.chat-header-avi{
  width:40px;height:40px;border-radius:50%;background:var(--grad);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:.85rem;font-weight:800;color:#fff;overflow:hidden}
.chat-header-avi img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.chat-header-info h4{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:800;color:var(--text)}
.chat-header-info p{font-size:.75rem;color:var(--muted);margin-top:1px}
.chat-actions{margin-left:auto;display:flex;gap:8px}

.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.day-divider{
  display:flex;align-items:center;gap:10px;margin:8px 0;font-size:.72rem;color:var(--muted)}
.day-divider::before,.day-divider::after{content:'';flex:1;height:1px;background:var(--border)}

.msg-bubble-wrap{display:flex;gap:10px;align-items:flex-end;max-width:80%}
.msg-bubble-wrap.mine{align-self:flex-end;flex-direction:row-reverse}
.msg-bubble-wrap.theirs{align-self:flex-start}

.msg-mini-avi{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:var(--grad);display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:.6rem;font-weight:800;color:#fff;overflow:hidden}
.msg-mini-avi img{width:100%;height:100%;object-fit:cover;border-radius:50%}

.msg-bubble{
  padding:10px 14px;border-radius:18px;max-width:420px;
  font-size:.88rem;line-height:1.5;word-break:break-word;position:relative}
.mine .msg-bubble{
  background:var(--grad);color:#fff;border-bottom-right-radius:4px}
.theirs .msg-bubble{
  background:var(--card);color:var(--text);border:1.5px solid var(--border);border-bottom-left-radius:4px}
.msg-time-label{
  font-size:.65rem;color:rgba(255,255,255,.7);display:block;text-align:right;margin-top:4px}
.theirs .msg-time-label{color:var(--muted)}

.sending-bubble{opacity:.6;font-style:italic}

/* ── Input Box ── */
.chat-input-area{
  padding:14px 20px;background:var(--card);border-top:1.5px solid var(--border);
  display:flex;align-items:center;gap:12px}
.chat-input{
  flex:1;padding:11px 16px;border-radius:30px;
  border:1.5px solid var(--border);background:var(--bg2);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:.92rem;
  outline:none;transition:all .2s;resize:none;max-height:120px}
.chat-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--glow);background:var(--card)}
.send-btn{
  width:44px;height:44px;border-radius:50%;border:none;
  background:var(--grad);color:#fff;font-size:1.2rem;
  cursor:pointer;transition:all .2s;flex-shrink:0;
  display:flex;align-items:center;justify-content:center}
.send-btn:hover{transform:scale(1.1);box-shadow:0 4px 14px var(--glow)}
.send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ── No chat selected ── */
.chat-placeholder{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--muted);gap:16px}
.chat-placeholder .cp-icon{font-size:4rem;animation:drift 4s ease-in-out infinite alternate}
.chat-placeholder h3{font-family:'Syne',sans-serif;font-size:1.2rem;color:var(--text)}
.chat-placeholder p{font-size:.88rem;max-width:300px;text-align:center}
@keyframes drift{from{transform:translateY(0)}to{transform:translateY(-12px)}}

/* ── New message modal ── */
.search-modal{
  position:fixed;inset:0;z-index:1200;background:rgba(0,0,0,.6);
  backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center}
.search-modal.open{display:flex}
.search-modal-inner{
  background:var(--card);border-radius:18px;padding:20px;
  width:100%;max-width:420px;border:1.5px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,.3)}
.search-modal-inner h3{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--text);margin-bottom:14px}
.search-modal-inner input{
  width:100%;padding:10px 14px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--bg2);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;
  outline:none;transition:all .2s;box-sizing:border-box}
.search-modal-inner input:focus{border-color:var(--primary)}
.user-results{margin-top:12px;display:flex;flex-direction:column;gap:6px;max-height:280px;overflow-y:auto}
.user-result-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;
  border-radius:12px;cursor:pointer;transition:all .18s}
.user-result-item:hover{background:var(--bg2)}
.ur-avi{width:38px;height:38px;border-radius:50%;background:var(--grad);
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:.8rem;font-weight:800;color:#fff;overflow:hidden;flex-shrink:0}
.ur-avi img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ur-info h4{font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;color:var(--text)}
.ur-info p{font-size:.74rem;color:var(--muted)}
.modal-close{float:right;background:transparent;border:none;font-size:1.1rem;cursor:pointer;color:var(--muted)}
.modal-close:hover{color:var(--text)}

/* ── Tablet ── */
@media(max-width:1100px){
  .msg-shell{grid-template-columns:260px 1fr}
}

/* ── Mobile ── */
@media(max-width:768px){
  html,body{overflow-x:hidden;height:100%}
  body{overflow:hidden;padding-bottom:0}
  .navbar{height:60px}
  .msg-shell{
    position:fixed;top:60px;left:0;right:0;bottom:70px;
    display:flex;width:200%;transition:transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    grid-template-columns:none}
  
  /* View Switcher Logic */
  body.chat-active .msg-shell { transform: translateX(-50%); }
  
  .conv-panel{width:50%;height:100%;border-right:none}
  .chat-area{width:50%;height:100%}
  
  .mobile-nav{display:flex}
  
  /* Back button in chat header for mobile */
  .mobile-chat-back{
    display:flex !important;
    align-items:center;justify-content:center;
    width:36px;height:36px;border-radius:50%;
    background:var(--bg2);border:none;font-size:1.1rem;cursor:pointer}
}

.mobile-chat-back{display:none}

.conv-list{padding-bottom:20px}
.chat-messages{padding:12px;gap:8px}
.msg-bubble{max-width:85%}

.mobile-nav{position:fixed;bottom:0;left:0;right:0;z-index:1000;
  height:70px;background:var(--nav);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1.5px solid var(--border);
  display:none;align-items:center;justify-content:space-around;padding:0 10px}
.m-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;
  background:transparent;border:none;cursor:pointer;color:var(--muted);
  text-decoration:none;flex:1;transition:all .2s;padding:8px}
.m-nav-item:hover,.m-nav-item.active{color:var(--primary)}
.m-nav-icon{font-size:1.3rem}
.m-nav-lbl{font-size:.65rem;font-weight:700;font-family:'Syne',sans-serif}
</style>
</head>
<body class="loading">

<!-- LOADING SCREEN -->
<div id="loadingScreen" role="status" aria-label="Loading Messages">
  <div class="spinner"></div>
  <h2>CampusLink</h2>
</div>

<div id="contentReady" class="content-ready">

<!-- NAVBAR -->
<nav class="navbar">
  <a class="nav-logo" href="index.html">🌿 CampusLink</a>
  <div class="nav-right">
    <button class="icon-btn" onclick="history.back()">← Back</button>
    <button class="theme-btn" onclick="cycleTheme()">🎨 <span id="themeName">Emerald</span></button>
    <div class="nav-avatar" id="navAvatar"></div>
  </div>
</nav>

<!-- MESSAGES SHELL -->
<div class="msg-shell">

  <!-- LEFT: Conversation List -->
  <div class="conv-panel">
    <div class="conv-header">
      💬 Messages
      <button class="new-msg-btn" onclick="openNewMsg()" title="New message">✏️</button>
    </div>
    <div class="conv-search">
      <span class="conv-search-icon">🔍</span>
      <input type="text" id="convSearch" placeholder="Search conversations…" oninput="filterConvs(this.value)"/>
    </div>
    <div class="conv-list" id="convList">
      <div class="conv-empty">⏳ Loading…</div>
    </div>
  </div>

  <!-- RIGHT: Chat Area -->
  <div class="chat-area" id="chatArea">
    <div class="chat-placeholder" id="chatPlaceholder">
      <div class="cp-icon">💬</div>
      <h3>Your Messages</h3>
      <p>Select a conversation or start a new one by clicking ✏️</p>
    </div>
  </div>
</div>

<!-- New Message Modal (search users) -->
<div class="search-modal" id="newMsgModal" onclick="if(event.target===this)closeNewMsg()">
  <div class="search-modal-inner">
    <h3>New Message <button class="modal-close" onclick="closeNewMsg()">✕</button></h3>
    <input type="text" id="userSearch" placeholder="Search by name or email…" oninput="searchUsers(this.value)"/>
    <div class="user-results" id="userResults">
      <p style="font-size:.82rem;color:var(--muted);padding:12px 0">Start typing to search users…</p>
    </div>
  </div>
</div>

<!-- Mobile Nav -->
<nav class="mobile-nav">
  <a href="index.html" class="m-nav-item"><span class="m-nav-icon">🏠</span><span class="m-nav-lbl">Home</span></a>
  <a href="notifications.html" class="m-nav-item"><span class="m-nav-icon">🔔</span><span class="m-nav-lbl">Notifs</span></a>
  <button class="m-nav-item active"><span class="m-nav-icon">💬</span><span class="m-nav-lbl">Messages</span></button>
  <a href="settings.html" class="m-nav-item"><span class="m-nav-icon">⚙️</span><span class="m-nav-lbl">Settings</span></a>
</nav>

<div id="toastEl" role="status" aria-live="polite"></div>

<script type="module">
import { auth, db } from './firebase-config.js';
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import {
  collection, doc, getDoc, getDocs, setDoc, addDoc, updateDoc,
  onSnapshot, query, orderBy, limit, where, serverTimestamp, writeBatch
} from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

let currentUser     = null;
let currentChatId   = null;
let unsubMessages   = null;
let unsubConvs      = null;
let allConvs        = [];
let toastTimer      = null;

/* ── Theme ── */
const savedTheme = localStorage.getItem('cl_theme') || 'emerald';
document.documentElement.setAttribute('data-theme', savedTheme);
document.getElementById('themeName').textContent = savedTheme.charAt(0).toUpperCase() + savedTheme.slice(1);

/* ── Auth guard ── */
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;

  const initials = (user.displayName || 'U').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  const navAv = document.getElementById('navAvatar');
  if (user.photoURL) navAv.innerHTML = `<img src="${user.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  else navAv.textContent = initials;

  listenConversations();

  // Handle URL params (?chat=ID or ?u=USER_ID)
  const params = new URLSearchParams(window.location.search);
  const chatIdParam = params.get('chat');
  const userIdParam = params.get('u');

  if (chatIdParam) {
    // Wait for conversations to load then open
    let attempts = 0;
    const interval = setInterval(() => {
      attempts++;
      const conv = allConvs.find(c => c.id === chatIdParam);
      if (conv) {
        clearInterval(interval);
        const otherId = conv.participants.find(id => id !== currentUser.uid);
        openChat(chatIdParam, otherId, conv.participantNames?.[otherId], conv.participantPhotos?.[otherId]);
      }
      if (attempts > 20) clearInterval(interval);
    }, 200);
  } else if (userIdParam) {
    // Fetch user then start chat
    (async () => {
      try {
        const uSnap = await getDoc(doc(db, 'users', userIdParam));
        if (uSnap.exists()) {
          const u = uSnap.data();
          startChat(userIdParam, u.displayName, u.photoURL);
        }
      } catch (e) { console.error('Error starting chat from param:', e); }
    })();
  }

  // Hide loader
  setTimeout(() => {
    document.body.classList.remove('loading');
    document.body.classList.add('loaded');
  }, 200);
});

/* ════════════════════════════════════════════════════════════════
   CONVERSATIONS — real-time list
═══════════════════════════════════════════════════════════════ */
function listenConversations() {
  const q = query(
    collection(db, 'chats'),
    where('participants', 'array-contains', currentUser.uid)
    // orderBy('lastMessageTime', 'desc') // Temporarily commented out while index builds
  );
  unsubConvs = onSnapshot(q, snap => {
    allConvs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    // Manual sort by lastMessageTime (desc) while waiting for index
    allConvs.sort((a, b) => {
      const ta = a.lastMessageTime?.toMillis ? a.lastMessageTime.toMillis() : 0;
      const tb = b.lastMessageTime?.toMillis ? b.lastMessageTime.toMillis() : 0;
      return tb - ta;
    });
    renderConvList(allConvs);
  }, err => {
    document.getElementById('convList').innerHTML = `<div class="conv-empty">❌ ${err.message}</div>`;
  });
}

function renderConvList(convs) {
  const list = document.getElementById('convList');
  if (!convs.length) {
    list.innerHTML = `<div class="conv-empty">No conversations yet.<br>Click ✏️ to start one!</div>`;
    return;
  }
  list.innerHTML = convs.map(conv => {
    const otherId   = conv.participants.find(id => id !== currentUser.uid);
    const otherName = conv.participantNames?.[otherId] || 'User';
    const otherPhoto= conv.participantPhotos?.[otherId] || '';
    const initials  = otherName.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    const unread    = conv.unread?.[currentUser.uid] || 0;
    const last      = conv.lastMessage ? truncate(conv.lastMessage, 36) : 'Start chatting…';
    const ts        = timeAgo(conv.lastMessageTime);
    const isActive  = conv.id === currentChatId;

    const aviHTML = otherPhoto
      ? `<img src="${otherPhoto}" alt="${initials}">`
      : initials;

    return `<div class="conv-item ${isActive ? 'active' : ''} ${unread > 0 ? 'unread-conv' : ''}"
      id="ci-${conv.id}" onclick="openChat('${conv.id}','${otherId}','${escAttr(otherName)}','${escAttr(otherPhoto)}')">
      <div class="conv-avi">${aviHTML}</div>
      <div class="conv-info">
        <div class="conv-name">${escHTML(otherName)}</div>
        <div class="conv-preview">${escHTML(last)}</div>
      </div>
      <div class="conv-meta">
        <span class="conv-time">${ts}</span>
        ${unread > 0 ? `<span class="conv-unread-badge">${unread}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

/* ── Filter conversations ── */
window.filterConvs = function(val) {
  const q = val.toLowerCase();
  const filtered = allConvs.filter(conv => {
    const otherId   = conv.participants.find(id => id !== currentUser.uid);
    const otherName = (conv.participantNames?.[otherId] || '').toLowerCase();
    return otherName.includes(q);
  });
  renderConvList(filtered);
};

/* ════════════════════════════════════════════════════════════════
   OPEN CHAT
═══════════════════════════════════════════════════════════════ */
window.openChat = async function(chatId, otherId, otherName, otherPhoto) {
  currentChatId = chatId;

  // Highlight active conv
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`ci-${chatId}`)?.classList.add('active');

  // Mark unread as 0
  try {
    await updateDoc(doc(db, 'chats', chatId), {
      [`unread.${currentUser.uid}`]: 0
    });
  } catch {}

  // Mobile View Switch
  document.body.classList.add('chat-active');

  // Build chat UI
  buildChatHeader(otherId, otherName, otherPhoto);
  buildChatInput(chatId, otherId, otherName);

  // Start message listener
  if (unsubMessages) unsubMessages();
  const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('createdAt', 'asc'));
  unsubMessages = onSnapshot(q, snap => {
    const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMessages(msgs);
  });
};

function buildChatHeader(otherId, otherName, otherPhoto) {
  const initials = otherName.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
  const aviHTML  = otherPhoto
    ? `<img src="${otherPhoto}" alt="${initials}">`
    : initials;

  document.getElementById('chatArea').innerHTML = `
    <div class="chat-header">
      <button class="mobile-chat-back" onclick="closeChatMobile()" title="Back to list">❮</button>
      <div class="chat-header-avi">${aviHTML}</div>
      <div class="chat-header-info">
        <h4>${escHTML(otherName)}</h4>
        <p>Active on CampusLink</p>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area" id="chatInputArea"></div>`;
}

window.closeChatMobile = function() {
  document.body.classList.remove('chat-active');
  currentChatId = null;
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
};

function buildChatInput(chatId, otherId, otherName) {
  document.getElementById('chatInputArea').innerHTML = `
    <textarea class="chat-input" id="msgInput" rows="1"
      placeholder="Message ${escHTML(otherName)}…"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage('${chatId}','${otherId}')}"
      oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage('${chatId}','${otherId}')" title="Send">➤</button>`;
  document.getElementById('msgInput')?.focus();
}

/* ════════════════════════════════════════════════════════════════
   RENDER MESSAGES
═══════════════════════════════════════════════════════════════ */
function renderMessages(msgs) {
  const container = document.getElementById('chatMessages');
  if (!container) return;

  let lastDate = null;
  let html = '';

  msgs.forEach(m => {
    const isMine = m.senderId === currentUser.uid;
    const ts     = m.createdAt?.toDate ? m.createdAt.toDate() : new Date();
    const dateStr= ts.toLocaleDateString('en-IN', { weekday:'long', month:'short', day:'numeric' });
    const timeStr= ts.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });

    if (dateStr !== lastDate) {
      html += `<div class="day-divider">${dateStr}</div>`;
      lastDate = dateStr;
    }

    const initials = (m.senderName || 'U').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    const aviHTML  = m.senderPhoto
      ? `<img src="${m.senderPhoto}" alt="${initials}">`
      : initials;

    html += `<div class="msg-bubble-wrap ${isMine ? 'mine' : 'theirs'}">
      ${!isMine ? `<div class="msg-mini-avi">${aviHTML}</div>` : ''}
      <div class="msg-bubble">
        ${escHTML(m.text || '')}
        <span class="msg-time-label">${timeStr}</span>
      </div>
      ${isMine ? `<div class="msg-mini-avi">${aviHTML}</div>` : ''}
    </div>`;
  });

  container.innerHTML = html || `<div style="text-align:center;color:var(--muted);padding:40px;font-size:.88rem">No messages yet. Say hello! 👋</div>`;
  container.scrollTop = container.scrollHeight;
}

/* ════════════════════════════════════════════════════════════════
   SEND MESSAGE
═══════════════════════════════════════════════════════════════ */
window.sendMessage = async function(chatId, otherId) {
  const input = document.getElementById('msgInput');
  const btn   = document.getElementById('sendBtn');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = '';
  btn.disabled = true;

  try {
    const msgData = {
      text,
      senderId:    currentUser.uid,
      senderName:  currentUser.displayName || 'User',
      senderPhoto: currentUser.photoURL || '',
      createdAt:   serverTimestamp()
    };

    // Add message to subcollection
    await addDoc(collection(db, 'chats', chatId, 'messages'), msgData);

    // Update chat metadata
    await updateDoc(doc(db, 'chats', chatId), {
      lastMessage:     text,
      lastMessageTime: serverTimestamp(),
      [`unread.${otherId}`]: (allConvs.find(c => c.id === chatId)?.unread?.[otherId] || 0) + 1
    });

    // --- Send Notification to recipient ---
    try {
      if (otherId) {
        await addDoc(collection(db, 'notifications', otherId, 'items'), {
          type:      'message',
          fromId:    currentUser.uid,
          fromName:  currentUser.displayName || 'User',
          fromPhoto: currentUser.photoURL || '',
          chatId:    chatId,
          message:   `💬 ${currentUser.displayName || 'Someone'} sent you a message: "${truncate(text, 40)}"`,
          read:      false,
          createdAt: serverTimestamp()
        });
      }
    } catch(err) { console.warn('Notification failed:', err); }
  } catch(e) {
    showToast('❌ Could not send: ' + (e.message || ''));
  } finally {
    btn.disabled = false;
    input.focus();
  }
};

/* ════════════════════════════════════════════════════════════════
   START NEW CHAT (search users)
═══════════════════════════════════════════════════════════════ */
window.openNewMsg = function() {
  document.getElementById('newMsgModal').classList.add('open');
  document.getElementById('userSearch').value = '';
  document.getElementById('userResults').innerHTML = `<p style="font-size:.82rem;color:var(--muted);padding:12px 0">Start typing to search users…</p>`;
  setTimeout(() => document.getElementById('userSearch').focus(), 100);
};
window.closeNewMsg = function() {
  document.getElementById('newMsgModal').classList.remove('open');
};

/* Search Firestore users by displayName prefix */
window.searchUsers = async function(val) {
  const res = document.getElementById('userResults');
  if (!val.trim()) {
    res.innerHTML = `<p style="font-size:.82rem;color:var(--muted);padding:12px 0">Start typing to search…</p>`;
    return;
  }
  res.innerHTML = `<p style="font-size:.82rem;color:var(--muted);padding:12px 0">Searching…</p>`;
  try {
    const snap = await getDocs(collection(db, 'users'));
    const users = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .filter(u => u.uid !== currentUser.uid &&
        ((u.displayName || '').toLowerCase().includes(val.toLowerCase()) ||
         (u.email       || '').toLowerCase().includes(val.toLowerCase())));

    if (!users.length) { res.innerHTML = `<p style="font-size:.82rem;color:var(--muted);padding:10px 0">No users found</p>`; return; }

    res.innerHTML = users.map(u => {
      const initials = (u.displayName || 'U').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
      const aviHTML  = u.photoURL ? `<img src="${u.photoURL}" alt="${initials}">` : initials;
      return `<div class="user-result-item" onclick="startChat('${u.uid}','${escAttr(u.displayName||'User')}','${escAttr(u.photoURL||'')}')">
        <div class="ur-avi">${aviHTML}</div>
        <div class="ur-info">
          <h4>${escHTML(u.displayName||'User')}</h4>
          <p>${escHTML(u.role||u.email||'CampusLink Member')}</p>
        </div>
      </div>`;
    }).join('');
  } catch(e) { res.innerHTML = `<p style="color:#EF4444;font-size:.82rem">Error: ${e.message}</p>`; }
};

/* Start / open existing chat with a user */
window.startChat = async function(otherId, otherName, otherPhoto) {
  closeNewMsg();

  // Deterministic chat ID: sorted UIDs joined
  const chatId = [currentUser.uid, otherId].sort().join('_');
  const chatRef = doc(db, 'chats', chatId);
  const snap = await getDoc(chatRef);

  if (!snap.exists()) {
    // Create new chat doc
    await setDoc(chatRef, {
      participants: [currentUser.uid, otherId],
      participantNames: {
        [currentUser.uid]: currentUser.displayName || 'User',
        [otherId]:  otherName
      },
      participantPhotos: {
        [currentUser.uid]: currentUser.photoURL || '',
        [otherId]:  otherPhoto
      },
      lastMessage:     '',
      lastMessageTime: serverTimestamp(),
      unread: { [currentUser.uid]: 0, [otherId]: 0 },
      createdAt: serverTimestamp()
    });
  }

  openChat(chatId, otherId, otherName, otherPhoto);
};

/* ── Helpers ── */
window.autoResize = function(el) {
  el.style.height = '';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};
function truncate(str, n) { return str.length > n ? str.slice(0,n)+'…' : str; }
function escHTML(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(str) { return String(str).replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }
function timeAgo(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const s = Math.floor((Date.now() - d) / 1000);
  if (s < 60)    return 'now';
  if (s < 3600)  return `${Math.floor(s/60)}m`;
  if (s < 86400) return `${Math.floor(s/3600)}h`;
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}
function showToast(msg) {
  const el = document.getElementById('toastEl');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}
window.cycleTheme = function() {
  const themes = ['emerald','ocean','violet','midnight','rose','solar'];
  const cur  = localStorage.getItem('cl_theme') || 'emerald';
  const next = themes[(themes.indexOf(cur)+1) % themes.length];
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('cl_theme', next);
  document.getElementById('themeName').textContent = next.charAt(0).toUpperCase()+next.slice(1);
};
