<!DOCTYPE html>
<html lang="en" data-theme="emerald">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Profile — CampusLink</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script>
    (function () {
      const savedTheme = localStorage.getItem('cl_theme') || 'emerald';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <style>
    .profile-page-body {
      max-width: 900px;
      margin: 80px auto 100px;
      padding: 0 16px;
    }

    .profile-header-card {
      padding: 30px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .profile-header-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: var(--hero);
      opacity: 0.1;
      z-index: 0;
    }

    .ph-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--grad);
      border: 4px solid var(--card);
      box-shadow: 0 10px 30px var(--glow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      color: #fff;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    .ph-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .ph-info {
      position: relative;
      z-index: 1;
      margin-bottom: 20px;
      width: 100%;
    }

    .ph-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }

    .ph-role {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .ph-details {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .ph-detail-item {
      background: var(--bg2);
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .ph-bio {
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
      color: var(--text2);
      font-size: 0.92rem;
    }

    .ph-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      width: 100%;
      max-width: 450px;
      margin: 24px auto;
      padding: 16px;
      background: var(--bg2);
      border-radius: 20px;
      border: 1.5px solid var(--border);
    }

    .stat-box {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-val {
      font-family: 'Syne', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text);
    }

    .stat-lbl {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .ph-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 10px;
      width: 100%;
    }

    .btn-ph {
      padding: 10px 24px;
      border-radius: 14px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-follow {
      background: var(--grad);
      color: #fff;
      box-shadow: 0 6px 15px var(--glow);
    }

    .btn-follow.following {
      background: var(--bg);
      color: var(--text);
      border: 2px solid var(--primary);
      box-shadow: none;
    }

    .btn-message {
      background: var(--card);
      color: var(--text);
      border: 2px solid var(--border);
    }

    .btn-share {
      background: var(--card);
      height: 44px;
      width: 44px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      border: 2px solid var(--border);
      border-radius: 14px;
    }

    .user-posts-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text);
      margin: 40px 0 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-posts-title::after {
      content: '';
      flex: 1;
      height: 1.5px;
      background: var(--border);
    }

    .profile-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      gap: 16px;
      color: var(--muted);
      font-weight: 600;
    }

    @media (max-width: 600px) {
      .profile-page-body {
        margin-top: 70px;
      }

      .ph-stats {
        gap: 10px;
        padding: 12px;
      }

      .stat-val {
        font-size: 1.1rem;
      }

      .ph-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .btn-share {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a class="nav-logo" href="index.html">
      <img src="logo.png" alt="CampusLink Logo" class="logo-img">
      <h1 style="font-size:1.25rem; font-family:'Syne',sans-serif; font-weight:800; margin:0; display:inline">CampusLink
      </h1>
    </a>
    <div class="nav-right">
      <button class="icon-btn" onclick="history.back()">← Back</button>
      <div class="nav-avatar" id="navAvatar" onclick="window.location.href='settings.html'" style="cursor:pointer">
      </div>
    </div>
  </nav>

  <div class="profile-page-body" id="profilePage">
    <!-- Loader -->
    <div class="profile-loading" id="profileLoader">
      <div class="spinner" style="width:40px; height:40px; border-width:4px"></div>
      <p>Loading profile...</p>
    </div>

    <div id="profileContent" style="display:none">
      <!-- Profile Header Card -->
      <div class="card profile-header-card">
        <div class="ph-avatar" id="userAvatar"></div>
        <div class="ph-info">
          <h2 class="ph-name" id="userName">...</h2>
          <div class="ph-role" id="userRole">...</div>
          <div class="ph-details">
            <span class="ph-detail-item" id="userCollege">...</span>
            <span class="ph-detail-item" id="userDept">...</span>
          </div>
          <p class="ph-bio" id="userBio"></p>
        </div>

        <div class="ph-stats">
          <div class="stat-box">
            <span class="stat-val" id="statPosts">0</span>
            <span class="stat-lbl">Posts</span>
          </div>
          <div class="stat-box" onclick="openFollowers()" style="cursor:pointer">
            <span class="stat-val" id="statFollowers">0</span>
            <span class="stat-lbl">Followers</span>
          </div>
          <div class="stat-box" onclick="openFollowing()" style="cursor:pointer">
            <span class="stat-val" id="statFollowing">0</span>
            <span class="stat-lbl">Following</span>
          </div>
        </div>

        <div class="ph-actions" id="userActions">
          <button class="btn-ph btn-follow" id="followBtn" onclick="handleFollow()">+ Follow</button>
          <button class="btn-ph btn-message" id="msgBtn" onclick="handleMessage()">💬 Message</button>
          <button class="btn-ph btn-share" onclick="handleShare()" title="Share Profile">↗️</button>
        </div>
      </div>

      <div id="userChallengesSection" style="display:none">
        <div class="user-posts-title">🎯 Active Challenges</div>
        <div id="userChallengesContainer" class="chall-grid"></div>
      </div>

      <div class="user-posts-title">📰 Shared Posts</div>
      <div id="userPostsContainer"></div>
    </div>
  </div>

  <!-- Shared Lightbox -->
  <div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
    <img id="lightboxImg" src="" alt="Full screen preview" />
  </div>

  <!-- User List Modal (Followers/Following) -->
  <div class="overlay" id="userListOverlay" onclick="if(event.target.id==='userListOverlay')closeUserList()">
    <div class="modal">
      <div class="modal-header">
        <h3 id="userListTitle">Users</h3>
        <button class="close-btn" onclick="closeUserList()">✕</button>
      </div>
      <div class="modal-body" id="userListBody" style="max-height:400px; overflow-y:auto; padding:10px">
        <!-- User items will be injected here -->
      </div>
    </div>
  </div>

  <div id="toastEl" role="status" aria-live="polite"></div>

  <!-- Modules -->
  <script type="module" src="profile.js"></script>
</body>

</html>
